<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>supership · plan</title>
<style>
  :root{
    --bg:#0f1115;--panel:#171a21;--panel2:#1d2129;--line:#2a2f3a;--fg:#e6e9ef;
    --dim:#9aa3b2;--accent:#7aa2f7;--ok:#4ade80;--warn:#fbbf24;--bad:#f87171;
    --info:#60a5fa;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
       font:14px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;padding:24px}
  #app{max-width:1080px;margin:0 auto}
  h1{font-size:19px;margin:0 0 4px}
  h2{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);
     margin:28px 0 10px;border-bottom:1px solid var(--line);padding-bottom:6px}
  .sub{color:var(--dim);font-size:12px;margin-bottom:14px}
  .badges{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 4px}
  .pill{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;
        border:1px solid var(--line);background:var(--panel2);color:var(--dim)}
  .pill.st-done{background:#12341f;border-color:#1f5c37;color:var(--ok)}
  .pill.st-building,.pill.st-reviewing,.pill.st-planning,.pill.st-clarifying
       {background:#14263f;border-color:#274e86;color:var(--info)}
  .pill.st-awaiting_approval{background:#3a2c0e;border-color:#7a5c1d;color:var(--warn)}
  .pill.st-failed,.pill.st-stuck,.pill.st-unresolved{background:#3b1414;border-color:#7a2727;color:var(--bad)}
  .pill.st-pending{color:var(--dim)}
  .banner{border:1px solid #7a5c1d;background:#2a2210;color:#fcd34d;border-radius:10px;
          padding:12px 14px;margin:16px 0;font-size:13px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;
        padding:12px 14px;margin:8px 0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
  .piece .top{display:flex;gap:8px;align-items:center;margin-bottom:6px}
  .piece .id{font-family:var(--mono);color:var(--accent);font-weight:600}
  .piece .agent{font-size:11px;color:var(--dim);border:1px solid var(--line);
                border-radius:6px;padding:1px 6px}
  .piece .desc{font-size:13px;white-space:pre-wrap}
  .piece .sum{font-size:12px;color:var(--dim);margin-top:6px;white-space:pre-wrap}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--dim);font-weight:500}
  .prio{font-family:var(--mono);font-weight:700;border-radius:6px;padding:1px 7px;font-size:11px}
  .p0{background:#3b1414;color:var(--bad)} .p1{background:#3a2c0e;color:var(--warn)}
  .p2,.p3{background:var(--panel2);color:var(--dim)}
  .find .loc{font-family:var(--mono);font-size:12px;color:var(--accent)}
  .find .body{font-size:13px;color:var(--dim);margin-top:4px;white-space:pre-wrap}
  pre{background:var(--panel);border:1px solid var(--line);border-radius:10px;
      padding:12px;overflow:auto;font:12px/1.5 var(--mono);white-space:pre-wrap}
  .log{font-family:var(--mono);font-size:12px}
  .log .t{color:var(--dim);padding-right:10px;white-space:nowrap}
  .log .ph{color:var(--accent);padding-right:10px;white-space:nowrap}
  details{margin:10px 0} summary{cursor:pointer;color:var(--dim);font-size:13px}
  .empty{color:var(--dim);font-size:13px;font-style:italic}
  .refresh{color:var(--dim);font-size:11px}
  ul{margin:6px 0;padding-left:20px}
</style>
</head>
<body>
<div id="app"></div>
<script type="application/json" id="plan-data">{
 "meta": {
  "task": "Add retry with backoff to the tx submission path",
  "slug": "demo",
  "mode": "interactive",
  "created": "2026-07-05 17:40:00",
  "updated": "2026-07-05 20:22:03",
  "status": "done"
 },
 "spec": "Add bounded retry (3 attempts, expo backoff + jitter) to SubmitTx.\nDecisions: reuse internal/utils backoff; no new deps.\nNon-goals: no idempotency-key redesign; no metrics changes.",
 "plan": {
  "mode": "parallel",
  "overlap": false,
  "notes": "p1 and p2 touch disjoint files; verify with make test after both.",
  "review_lenses": [
   "correctness",
   "edge-cases"
  ],
  "pieces": [
   {
    "id": "p1",
    "agent": "task",
    "status": "done",
    "description": "Wrap SubmitTx in retry using utils.Backoff (3 attempts, jitter). Guard: never re-submit on definite-accept errors.",
    "summary": "Reused utils.RetryWithBackoff; 14-line diff; added table test."
   },
   {
    "id": "p2",
    "agent": "task",
    "status": "done",
    "description": "Surface retry count in the submit log line.",
    "summary": "One-line change + test update."
   },
   {
    "id": "p3",
    "agent": "task",
    "status": "unresolved",
    "description": "Handle mempool-full: distinguish transient vs terminal.",
    "summary": "stuck: upstream error codes ambiguous — escalated to architect; descoped to follow-up."
   }
  ]
 },
 "approval": {
  "state": "approved",
  "at": "2026-07-05 17:46:10",
  "notes": "approved after merging old p2+p3"
 },
 "progress_log": [
  {
   "t": "17:45:02",
   "phase": "plan",
   "msg": "plan ready: parallel/overlap=False, 3 piece(s)"
  },
  {
   "t": "17:46:10",
   "phase": "plan",
   "msg": "plan approved by user"
  },
  {
   "t": "17:49:33",
   "phase": "build",
   "msg": "p1: done"
  },
  {
   "t": "17:49:41",
   "phase": "build",
   "msg": "p2: done"
  },
  {
   "t": "17:52:07",
   "phase": "build",
   "msg": "p3: unresolved"
  },
  {
   "t": "17:58:20",
   "phase": "review",
   "msg": "round 1: 3 found, 1 kept"
  },
  {
   "t": "18:03:11",
   "phase": "review",
   "msg": "round 2: clean — no findings"
  }
 ],
 "review_rounds": [
  {
   "round": 1,
   "found": 3,
   "kept": 1,
   "verdicts": [
    {
     "lens": "correctness",
     "verdict": "issues_remain",
     "explanation": "retry can double-submit on timeout"
    },
    {
     "lens": "edge-cases",
     "verdict": "clean",
     "explanation": ""
    },
    {
     "lens": "over-engineering",
     "verdict": "clean",
     "explanation": ""
    }
   ]
  },
  {
   "round": 2,
   "found": 0,
   "kept": 0,
   "verdicts": []
  }
 ],
 "findings": [
  {
   "id": "r1-0",
   "title": "Timeout ambiguity can double-submit a tx",
   "body": "A submit that times out may still land on-chain; blind retry re-broadcasts. Fix: check mempool/confirmation before re-submitting.",
   "file_path": "internal/tx/submit.go",
   "line_start": 42,
   "line_end": 58,
   "priority": 0,
   "confidence": 0.9
  }
 ],
 "unresolved": [
  {
   "id": "p3",
   "why": {
    "kind": "design",
    "tried": "mapped upstream codes",
    "question": "is mempool-full terminal for our backend?"
   }
  }
 ],
 "lessons": "- Timeout != failure for tx submission: always check before re-broadcast.\n- Upstream error taxonomy is ambiguous; descope early rather than guess.",
 "ponytail_debt": [
  "internal/tx/submit.go:51 — ponytail: fixed 3 attempts; make configurable if ops asks"
 ]
}</script>
<script>
(function () {
  "use strict";
  var app = document.getElementById("app");
  var S;
  try { S = JSON.parse(document.getElementById("plan-data").textContent); }
  catch (e) { app.textContent = "Invalid plan-data JSON: " + e; return; }

  function el(tag, cls, text) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text !== undefined && text !== null) n.textContent = String(text);
    return n;
  }
  function section(title) { app.appendChild(el("h2", null, title)); }
  function pill(text, st) { return el("span", "pill" + (st ? " st-" + st : ""), text); }

  var meta = S.meta || {};
  var ACTIVE = ["done", "failed"].indexOf(meta.status) < 0;

  // ---- header -------------------------------------------------------------
  app.appendChild(el("h1", null, meta.task || "supership plan"));
  var badges = el("div", "badges");
  badges.appendChild(pill(meta.status || "?", meta.status));
  badges.appendChild(pill("mode: " + (meta.mode || "?")));
  badges.appendChild(pill("slug: " + (meta.slug || "?")));
  var appr = (S.approval || {}).state;
  if (appr) badges.appendChild(pill("approval: " + appr,
      appr === "approved" || appr === "auto" ? "done" : "awaiting_approval"));
  app.appendChild(badges);
  app.appendChild(el("div", "sub",
    "updated " + (meta.updated || "?") +
    (ACTIVE ? "  ·  live — auto-refreshing every 5s" : "  ·  final")));

  if (meta.status === "awaiting_approval") {
    app.appendChild(el("div", "banner",
      "Awaiting your approval — refine the plan in chat (or edit the JSON in " +
      "this file, save, and tell the agent to re-read), then approve to start the build."));
  }

  // ---- spec ---------------------------------------------------------------
  if (S.spec) {
    section("Clarified spec");
    var d = el("details"); if (meta.status === "awaiting_approval") d.open = true;
    d.appendChild(el("summary", null, "show spec"));
    d.appendChild(el("pre", null, S.spec));
    app.appendChild(d);
  }

  // ---- plan / pieces ------------------------------------------------------
  var plan = S.plan || {};
  section("Plan");
  var ov = el("div", "card");
  ov.appendChild(el("div", null,
    "shape: " + (plan.mode || "?") +
    (plan.mode === "parallel" ? " · overlap: " + !!plan.overlap : "") +
    " · review lenses: " + ((plan.review_lenses || []).join(", ") || "—")));
  if (plan.notes) ov.appendChild(el("div", "sum", "notes: " + plan.notes));
  app.appendChild(ov);
  var grid = el("div", "grid");
  (plan.pieces || []).forEach(function (p) {
    var c = el("div", "card piece");
    var top = el("div", "top");
    top.appendChild(el("span", "id", p.id));
    top.appendChild(el("span", "agent", p.agent || "task"));
    top.appendChild(pill(p.status || "pending", p.status || "pending"));
    c.appendChild(top);
    c.appendChild(el("div", "desc", p.description || ""));
    if (p.summary) c.appendChild(el("div", "sum", p.summary));
    grid.appendChild(c);
  });
  app.appendChild(grid);

  // ---- review rounds ------------------------------------------------------
  var rounds = S.review_rounds || [];
  if (rounds.length) {
    section("Review rounds");
    var t = el("table"), tr = el("tr");
    ["round", "found", "kept", "verdicts"].forEach(function (h) { tr.appendChild(el("th", null, h)); });
    t.appendChild(tr);
    rounds.forEach(function (r) {
      var row = el("tr");
      row.appendChild(el("td", null, r.round));
      row.appendChild(el("td", null, r.found));
      row.appendChild(el("td", null, r.kept));
      var v = el("td");
      (r.verdicts || []).forEach(function (x) {
        v.appendChild(pill(x.lens + ": " + x.verdict, x.verdict === "clean" ? "done" : "stuck"));
        v.appendChild(document.createTextNode(" "));
      });
      row.appendChild(v);
      t.appendChild(row);
    });
    app.appendChild(t);
  }

  // ---- findings -----------------------------------------------------------
  var finds = S.findings || [];
  if (finds.length) {
    section("Findings (kept by the judge)");
    finds.forEach(function (f) {
      var c = el("div", "card find");
      var top = el("div", "top");
      top.appendChild(el("span", "prio p" + (f.priority != null ? f.priority : 3), "P" + f.priority));
      top.appendChild(el("strong", null, " " + (f.title || "")));
      c.appendChild(top);
      c.appendChild(el("div", "loc",
        (f.file_path || "?") + ":" + (f.line_start || "?") + "-" + (f.line_end || "?") +
        "  · confidence " + (f.confidence != null ? f.confidence : "?")));
      c.appendChild(el("div", "body", f.body || ""));
      app.appendChild(c);
    });
  }

  // ---- unresolved ---------------------------------------------------------
  var unres = S.unresolved || [];
  if (unres.length) {
    section("Unresolved");
    var ul = el("ul");
    unres.forEach(function (u) {
      ul.appendChild(el("li", null, u.id + ": " + (typeof u.why === "string" ? u.why : JSON.stringify(u.why))));
    });
    var c2 = el("div", "card"); c2.appendChild(ul); app.appendChild(c2);
  }

  // ---- lessons + debt -----------------------------------------------------
  if (S.lessons) { section("Lessons"); app.appendChild(el("pre", null, S.lessons)); }
  var debt = S.ponytail_debt || [];
  if (debt.length) {
    section("Ponytail debt");
    var ul2 = el("ul");
    debt.forEach(function (x) { ul2.appendChild(el("li", null, typeof x === "string" ? x : JSON.stringify(x))); });
    var c3 = el("div", "card"); c3.appendChild(ul2); app.appendChild(c3);
  }

  // ---- progress log -------------------------------------------------------
  var logits = (S.progress_log || []).slice(-40).reverse();
  if (logits.length) {
    section("Progress (latest first)");
    var lt = el("table", "log");
    logits.forEach(function (x) {
      var row = el("tr");
      row.appendChild(el("td", "t", x.t || ""));
      row.appendChild(el("td", "ph", x.phase || ""));
      row.appendChild(el("td", null, x.msg || ""));
      lt.appendChild(row);
    });
    app.appendChild(lt);
  }

  // ---- raw ----------------------------------------------------------------
  section("Raw state");
  var det = el("details");
  det.appendChild(el("summary", null, "show canonical JSON"));
  det.appendChild(el("pre", null, JSON.stringify(S, null, 2)));
  app.appendChild(det);

  if (ACTIVE) setTimeout(function () { location.reload(); }, 5000);
})();
</script>
</body>
</html>
