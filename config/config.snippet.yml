# Reference snippet for ~/.omp/agent/config.yml — the keys this kit relies on.
# Do NOT copy this file over your config wholesale; merge the keys (or run
# ./install.sh --config, which applies them via `omp config set`).

modelRoles:
  # ┌─ Fallback chains as YAML LISTS, in order (first resolvable model wins).
  # │  REQUIRES omp >= 16.3.7: list values crash the pi/<role> resolver on
  # │  older builds (can1357/oh-my-pi#4492). On < 16.3.7, flatten each list
  # │  to one comma-separated string — identical semantics.
  # └────────────────────────────────────────────────────────────────────────
  # main agent
  default:
    - openai-codex/gpt-5.6-sol:high
    - anthropic/claude-opus-4-8:high
  # cheap scouts (david-research, explore, librarian, sonic)
  # (cost-ordered: luna $1/$6, haiku $1/$5, flash $1.5/$9 — flash is the
  #  priciest of the three despite the name)
  smol:
    - openai-codex/gpt-5.6-luna:medium
    - anthropic/claude-haiku-4-5:medium
    - google-antigravity/gemini-3.5-flash:medium
  # reviewer tier + the review judge
  slow:
    - openai-codex/gpt-5.6-sol:high
    - anthropic/claude-fable-5:high
  # GENIUS chain (planner / deep-debugger): super-smart, slow
  plan:
    - anthropic/claude-fable-5:high
    - openai-codex/gpt-5.6-sol:xhigh
    - anthropic/claude-opus-4-8:max
  # mechanical workers (the task agent)
  task:
    - openai-codex/gpt-5.6-terra:medium
    - anthropic/claude-sonnet-5:high
  advisor:
    - anthropic/claude-fable-5:high
    - openai-codex/gpt-5.6-sol:xhigh
  designer:
    - openai-codex/gpt-5.6-sol:medium
    - zai/glm-5.2:high
  # ultra seats (used only by /ultraship + /ultrashipit): plato = chief architect
  # / final consolidator, aristotle = challenger. Putting the SAME model in both
  # is legal (you just lose model diversity in the debate).
  plato:
    - anthropic/claude-fable-5:high
    - anthropic/claude-opus-4-8:max
  aristotle:
    - openai-codex/gpt-5.6-sol:xhigh
    - openai-codex/gpt-5.6-sol-pro:xhigh
  # ┌─ These two are NOT fallback chains — read them differently:
  # │  • taskpool = a POOL. Cell 2 round-robins + health-checks each entry per
  # │    provider to load-balance plain `task` builders/fixers/verifiers across
  # │    subscriptions. Entries are single model patterns; weight by REPEATING an
  # │    entry; taskpool:[] DISABLES pooling; omitting the key uses the default.
  # │  • reviewers = a DIVERSITY SET. Entries ALTERNATE across the review lenses
  # │    (model[i % len]) so different lenses get different eyes. An entry MAY be
  # │    a comma-joined chain, but the LIST is not a fallback chain.
  # └────────────────────────────────────────────────────────────────────────
  taskpool:
    - openai-codex/gpt-5.6-terra:medium
    - anthropic/claude-sonnet-5:high
  reviewers:
    - anthropic/claude-opus-4-8:max
    - openai-codex/gpt-5.6-sol:high

task:
  # Default is 2, which tool-strips deep-debugger when a task agent spawns it
  # ad hoc (main=0 -> task=1 -> debugger=2 = AT cap -> loses its scouts).
  # /supership routes escalation at depth 0 regardless; 3 is for ad-hoc use.
  maxRecursionDepth: 3
  # Per-subagent request-count governor: omp steers the child to wrap up at the
  # budget and HARD-ABORTS it at 1.5x. The default (90 -> kill at 135) is far
  # too low for this kit's builders/debuggers, which routinely need 150+
  # requests — a real run had a deep-debugger killed at 135 in the exact
  # instant it yielded status=done (the pipeline salvages that case via
  # salvage_yield, but don't rely on it). 250 warns at 250, kills at 375.
  softRequestBudget: 250
  # Off by default, meaning children get NO warning — the first signal is the
  # kill. Turn it on so agents can wrap up and yield instead of dying mid-work.
  softRequestBudgetNotice: true

compaction:
  # snapcompact needs an omp build with the frame-payload cap (PR #3866,
  # >= v16.2.8). On older builds use 'shake' or long sessions can wedge with
  # "Anthropic Internal server error" on resume.
  strategy: snapcompact

memory:
  backend: local   # per-repo memory; consolidated ## Lessons get captured
